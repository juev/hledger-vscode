name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      OVSX_PAT: ${{ secrets.OVSX_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for all tags and branches

      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Run tests
        run: npm test

      - name: Extract version from tag
        id: extract_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          # Validate semantic version format (x.y.z)
          if [[ ! $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version '$VERSION' is not in semantic version format (x.y.z)"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Update package.json version
        run: |
          npm version ${{ steps.extract_version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Update CHANGELOG.md
        run: |
          chmod +x .github/scripts/update-changelog.js
          node .github/scripts/update-changelog.js
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Package extension
        run: npx vsce package

      - name: Publish to Visual Studio Marketplace
        run: npx vsce publish --packagePath *.vsix -p ${{ secrets.VSCE_PAT }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: npx ovsx publish *.vsix

      - name: Generate release notes
        id: generate_notes
        run: |
          # Make script executable
          chmod +x .github/scripts/generate-release-notes.js
          # Generate release notes
          RELEASE_NOTES=$(node .github/scripts/generate-release-notes.js)
          # Handle multiline output for GitHub Actions
          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.extract_version.outputs.version }}
          body: ${{ steps.generate_notes.outputs.release_notes }}
          files: "*.vsix"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Runs last and never fails the release: publishing the artifacts is the
      # critical work and already happened above. The tag-triggered checkout is
      # a detached HEAD on the tag commit, so main may have moved ahead; rebase
      # onto the latest main before pushing to avoid a non-fast-forward error.
      - name: Commit CHANGELOG.md
        if: always()
        continue-on-error: true
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add CHANGELOG.md
          if git diff --staged --quiet; then
            echo "No changes to CHANGELOG.md"
          else
            git commit -m "chore: update CHANGELOG.md for v${{ steps.extract_version.outputs.version }}"
            git fetch origin main
            if ! git rebase origin/main; then
              echo "Rebase onto origin/main failed; skipping CHANGELOG push"
              git rebase --abort || true
              exit 0
            fi
            git push origin HEAD:main || echo "Failed to push CHANGELOG.md (non-fatal)"
          fi
